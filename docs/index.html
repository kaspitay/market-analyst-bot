<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Analyst Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; }
    .header { background: #1a1a2e; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a4a; }
    .header h1 { font-size: 22px; color: #fff; }
    .header .updated { color: #888; font-size: 13px; }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    .grid { display: grid; gap: 16px; }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .card { background: #1a1a2e; border-radius: 10px; padding: 20px; border: 1px solid #2a2a4a; }
    .card h2 { font-size: 15px; color: #888; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .market-card { text-align: center; }
    .market-card .label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .market-card .price { font-size: 24px; font-weight: 700; color: #fff; }
    .market-card .change { font-size: 14px; margin-top: 4px; }
    .green { color: #00c853; }
    .red { color: #ff1744; }
    .neutral { color: #888; }
    .gauge-container { display: flex; align-items: center; gap: 20px; }
    .gauge-info { flex: 1; }
    .gauge-score { font-size: 48px; font-weight: 700; }
    .gauge-label { font-size: 18px; margin-top: 4px; }
    .gauge-history { margin-top: 12px; font-size: 13px; color: #888; }
    .gauge-history span { display: block; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 12px; color: #888; border-bottom: 1px solid #2a2a4a; cursor: pointer; user-select: none; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    th:hover { color: #fff; }
    td { padding: 10px 12px; border-bottom: 1px solid #1f1f3a; }
    tr.clickable { cursor: pointer; }
    tr.clickable:hover { background: #22224a; }
    .detail-row { display: none; }
    .detail-row.open { display: table-row; }
    .detail-row td { padding: 16px; background: #12122a; }
    .detail-content { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .detail-chart { height: 200px; }
    .detail-info { font-size: 13px; }
    .detail-info .row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #1f1f3a; }
    .detail-info .row .label { color: #888; }
    .signal-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin: 2px; }
    .signal-bullish { background: #00c85322; color: #00c853; border: 1px solid #00c85344; }
    .signal-bearish { background: #ff174422; color: #ff1744; border: 1px solid #ff174444; }
    .signal-neutral { background: #88888822; color: #aaa; border: 1px solid #88888844; }
    .news-item { padding: 6px 0; border-bottom: 1px solid #1f1f3a; font-size: 12px; }
    .news-item:last-child { border: none; }
    .earnings-badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; background: #e9456022; color: #e94560; border: 1px solid #e9456044; margin-left: 8px; }
    .section-label { font-size: 11px; color: #e94560; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .donut-container { max-width: 350px; margin: 0 auto; }
    .briefing-card { background: #12122a; border-radius: 8px; padding: 14px; margin-bottom: 8px; cursor: pointer; border: 1px solid #2a2a4a; }
    .briefing-card:hover { border-color: #e94560; }
    .briefing-card .meta { display: flex; justify-content: space-between; font-size: 12px; color: #888; }
    .briefing-content { display: none; margin-top: 10px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
    .briefing-card.open .briefing-content { display: block; }
    .loading { color: #555; font-style: italic; }
    .tab-bar { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; border: 1px solid #2a2a4a; color: #888; background: transparent; }
    .tab.active { background: #e94560; color: #fff; border-color: #e94560; }
    @media (max-width: 900px) {
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
      .grid-2 { grid-template-columns: 1fr; }
      .detail-content { grid-template-columns: 1fr; }
    }
    @media (max-width: 500px) {
      .grid-4 { grid-template-columns: 1fr; }
      .container { padding: 10px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Market Analyst Dashboard</h1>
    <div class="updated" id="last-updated">Loading...</div>
  </div>
  <div class="container">
    <!-- Market Overview -->
    <div class="grid grid-4" id="market-overview" style="margin-bottom:16px"></div>

    <!-- Fear & Greed + Allocation -->
    <div class="grid grid-2" style="margin-bottom:16px">
      <div class="card" id="fear-greed-card">
        <h2>Fear & Greed Index</h2>
        <div class="gauge-container">
          <div style="width:180px;height:120px"><canvas id="gauge-chart"></canvas></div>
          <div class="gauge-info">
            <div class="gauge-score" id="fg-score">--</div>
            <div class="gauge-label" id="fg-label">Loading...</div>
            <div class="gauge-history" id="fg-history"></div>
          </div>
        </div>
      </div>
      <div class="card">
        <h2>Portfolio Allocation</h2>
        <div class="donut-container"><canvas id="alloc-chart"></canvas></div>
      </div>
    </div>

    <!-- Economic Calendar -->
    <div class="card" style="margin-bottom:16px" id="econ-card">
      <h2>Economic Calendar & Upcoming Earnings</h2>
      <div id="calendar-content" class="loading">Loading...</div>
    </div>

    <!-- Ticker Tables -->
    <div class="card" style="margin-bottom:16px">
      <div class="tab-bar">
        <button class="tab active" onclick="showTab('portfolio')">Portfolio (24)</button>
        <button class="tab" onclick="showTab('watchlist')">Watchlist (11)</button>
      </div>
      <table>
        <thead>
          <tr>
            <th onclick="sortTable(0)">Ticker</th>
            <th onclick="sortTable(1)">Allocation</th>
            <th onclick="sortTable(2)">Price</th>
            <th onclick="sortTable(3)">Change</th>
            <th onclick="sortTable(4)">RSI</th>
            <th onclick="sortTable(5)">SMA50</th>
            <th onclick="sortTable(6)">SMA200</th>
            <th onclick="sortTable(7)">52W H/L</th>
            <th>Signals</th>
          </tr>
        </thead>
        <tbody id="ticker-body"></tbody>
      </table>
    </div>

    <!-- Briefing History -->
    <div class="card">
      <h2>Briefing History</h2>
      <div id="briefing-history" class="loading">Loading...</div>
    </div>
  </div>

<script>
let DATA = null;
let BRIEFINGS = [];
let currentTab = 'portfolio';
let sortCol = 1;
let sortAsc = false;
let openCharts = {};

async function loadData() {
  try {
    const resp = await fetch('data/market-data.json');
    DATA = await resp.json();
    renderAll();
  } catch (e) {
    document.getElementById('last-updated').textContent = 'No data yet — run the analyzer first';
  }
  try {
    const resp = await fetch('data/briefings.jsonl');
    const text = await resp.text();
    BRIEFINGS = text.trim().split('\n').filter(l => l).map(l => JSON.parse(l)).reverse();
    renderBriefings();
  } catch (e) {}
}

function renderAll() {
  const d = new Date(DATA.updated);
  document.getElementById('last-updated').textContent = 'Updated: ' + d.toLocaleString();
  renderMarketOverview();
  renderFearGreed();
  renderAllocation();
  renderCalendar();
  renderTickers();
}

function renderMarketOverview() {
  const el = document.getElementById('market-overview');
  const indices = DATA.indicators.indices || {};
  const vix = DATA.indicators.vix;
  const items = [
    { label: 'S&P 500', data: indices.sp500 },
    { label: 'Dow Jones', data: indices.dow },
    { label: 'NASDAQ', data: indices.nasdaq },
    { label: 'VIX', data: vix ? { price: vix.price, changesPercentage: vix.pct } : null },
  ];
  el.innerHTML = items.map(item => {
    if (!item.data) return `<div class="card market-card"><div class="label">${item.label}</div><div class="price">--</div></div>`;
    const pct = item.data.changesPercentage || 0;
    const cls = pct > 0 ? 'green' : pct < 0 ? 'red' : 'neutral';
    const arrow = pct > 0 ? '▲' : pct < 0 ? '▼' : '';
    const price = typeof item.data.price === 'number' ? '$' + item.data.price.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) : item.data.price;
    return `<div class="card market-card"><div class="label">${item.label}</div><div class="price">${price}</div><div class="change ${cls}">${arrow} ${pct.toFixed(2)}%</div></div>`;
  }).join('');
}

function renderFearGreed() {
  const fg = DATA.indicators.fear_greed;
  if (!fg) { document.getElementById('fg-label').textContent = 'Unavailable'; return; }
  const score = fg.now;
  let label, color;
  if (score <= 25) { label = 'Extreme Fear'; color = '#ff1744'; }
  else if (score <= 45) { label = 'Fear'; color = '#ff6d00'; }
  else if (score <= 55) { label = 'Neutral'; color = '#ffd600'; }
  else if (score <= 75) { label = 'Greed'; color = '#76ff03'; }
  else { label = 'Extreme Greed'; color = '#00c853'; }

  document.getElementById('fg-score').textContent = score;
  document.getElementById('fg-score').style.color = color;
  document.getElementById('fg-label').textContent = label;
  document.getElementById('fg-label').style.color = color;
  document.getElementById('fg-history').innerHTML =
    `<span>Previous close: ${fg.previous_close}</span>` +
    `<span>1 week ago: ${fg.one_week_ago}</span>` +
    `<span>1 month ago: ${fg.one_month_ago}</span>`;

  const ctx = document.getElementById('gauge-chart').getContext('2d');
  new Chart(ctx, {
    type: 'doughnut',
    data: {
      datasets: [{
        data: [score, 100 - score],
        backgroundColor: [color, '#1f1f3a'],
        borderWidth: 0,
      }]
    },
    options: {
      circumference: 180, rotation: 270,
      cutout: '75%',
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      responsive: true, maintainAspectRatio: false,
    }
  });
}

function renderAllocation() {
  const tickers = DATA.tickers;
  const portfolio = Object.entries(tickers).filter(([,v]) => v.type === 'portfolio').sort((a,b) => b[1].allocation - a[1].allocation);
  const top10 = portfolio.slice(0, 10);
  const rest = portfolio.slice(10);
  const restTotal = rest.reduce((s, [,v]) => s + v.allocation, 0);

  const labels = top10.map(([t]) => t);
  const data = top10.map(([,v]) => v.allocation);
  if (rest.length) { labels.push('Other (' + rest.length + ')'); data.push(Math.round(restTotal * 100) / 100); }

  const colors = ['#e94560','#0f3460','#16213e','#533483','#00c853','#ff6d00','#2979ff','#ffd600','#76ff03','#ff1744','#888'];
  const ctx = document.getElementById('alloc-chart').getContext('2d');
  new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 1, borderColor: '#0f0f1a' }] },
    options: {
      cutout: '55%',
      plugins: {
        legend: { position: 'right', labels: { color: '#ccc', font: { size: 11 }, padding: 8 } },
        tooltip: { callbacks: { label: ctx => `${ctx.label}: ${ctx.parsed}%` } }
      },
      responsive: true,
    }
  });
}

function renderCalendar() {
  const el = document.getElementById('calendar-content');
  let html = '';

  const cal = DATA.indicators.calendar || [];
  if (cal.length) {
    html += '<div class="section-label">Economic Events</div>';
    cal.forEach(e => {
      html += `<div style="padding:4px 0;font-size:13px"><b>${e.date}</b> — ${e.title}<br><span style="color:#888;font-size:12px">${e.description}</span></div>`;
    });
  }

  const earnings = DATA.earnings || [];
  if (earnings.length) {
    html += '<div class="section-label" style="margin-top:12px">Earnings</div>';
    earnings.forEach(e => {
      const inPortfolio = DATA.tickers[e.symbol]?.type === 'portfolio';
      const badge = inPortfolio ? '<span class="earnings-badge">PORTFOLIO</span>' : '<span class="earnings-badge" style="background:#0f346022;color:#0f3460;border-color:#0f346044">WATCHLIST</span>';
      const eps = e.eps_est != null ? `EPS est: $${e.eps_est.toFixed(2)}` : 'EPS est: N/A';
      html += `<div style="padding:4px 0;font-size:13px"><b>${e.symbol}</b>${badge} — ${e.date} (${e.hour}) — ${eps}</div>`;
    });
  }

  el.innerHTML = html || '<span class="loading">No upcoming events</span>';
  el.classList.remove('loading');
}

function signalTag(signal) {
  const bullish = ['above SMA50', 'above SMA200', 'golden cross', 'oversold'];
  const bearish = ['below SMA50', 'below SMA200', 'death cross', 'overbought'];
  const cls = bullish.includes(signal) ? 'signal-bullish' : bearish.includes(signal) ? 'signal-bearish' : 'signal-neutral';
  return `<span class="signal-tag ${cls}">${signal}</span>`;
}

function rsiColor(rsi) {
  if (!rsi) return 'neutral';
  if (rsi > 70) return 'red';
  if (rsi < 30) return 'green';
  return '';
}

function renderTickers() {
  const tbody = document.getElementById('ticker-body');
  const entries = Object.entries(DATA.tickers)
    .filter(([,v]) => v.type === currentTab)
    .map(([ticker, v]) => ({ ticker, ...v }));

  // Sort
  entries.sort((a, b) => {
    let va, vb;
    const ta = a.technicals || {};
    const tb = b.technicals || {};
    switch (sortCol) {
      case 0: va = a.ticker; vb = b.ticker; break;
      case 1: va = a.allocation || 0; vb = b.allocation || 0; break;
      case 2: va = ta.price || 0; vb = tb.price || 0; break;
      case 3: va = ta.change_pct || 0; vb = tb.change_pct || 0; break;
      case 4: va = ta.rsi || 0; vb = tb.rsi || 0; break;
      case 5: va = ta.sma50 || 0; vb = tb.sma50 || 0; break;
      case 6: va = ta.sma200 || 0; vb = tb.sma200 || 0; break;
      default: va = a.allocation || 0; vb = b.allocation || 0;
    }
    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? va - vb : vb - va;
  });

  let html = '';
  entries.forEach(e => {
    const t = e.technicals || {};
    const chgCls = (t.change_pct || 0) > 0 ? 'green' : (t.change_pct || 0) < 0 ? 'red' : 'neutral';
    const alloc = e.allocation != null ? e.allocation + '%' : '—';
    const price = t.price ? '$' + t.price.toFixed(2) : '—';
    const chg = t.change_pct != null ? (t.change_pct > 0 ? '+' : '') + t.change_pct.toFixed(2) + '%' : '—';
    const rsi = t.rsi != null ? t.rsi : '—';
    const sma50 = t.sma50 ? '$' + t.sma50.toFixed(2) : '—';
    const sma200 = t.sma200 ? '$' + t.sma200.toFixed(2) : '—';
    const h52 = t.high_52w ? '$' + t.high_52w.toFixed(2) : '—';
    const l52 = t.low_52w ? '$' + t.low_52w.toFixed(2) : '—';
    const signals = (t.signals || []).map(signalTag).join('');
    const earningsBadge = e.earnings?.length ? '<span class="earnings-badge">EARNINGS</span>' : '';

    html += `<tr class="clickable" onclick="toggleDetail('${e.ticker}')">
      <td><b>${e.ticker}</b>${earningsBadge}</td>
      <td>${alloc}</td>
      <td>${price}</td>
      <td class="${chgCls}">${chg}</td>
      <td class="${rsiColor(t.rsi)}">${rsi}</td>
      <td>${sma50}</td>
      <td>${sma200}</td>
      <td style="font-size:11px">${h52} / ${l52}</td>
      <td>${signals}</td>
    </tr>`;

    // Detail row
    html += `<tr class="detail-row" id="detail-${e.ticker}"><td colspan="9">
      <div class="detail-content">
        <div>
          <div class="section-label">3-Month Price Chart</div>
          <div class="detail-chart"><canvas id="chart-${e.ticker}"></canvas></div>
        </div>
        <div class="detail-info">
          <div class="section-label">Details</div>
          <div class="row"><span class="label">Price</span><span>${price}</span></div>
          <div class="row"><span class="label">Daily Change</span><span class="${chgCls}">${chg}</span></div>
          <div class="row"><span class="label">RSI (14)</span><span class="${rsiColor(t.rsi)}">${rsi}</span></div>
          <div class="row"><span class="label">SMA 50</span><span>${sma50}</span></div>
          <div class="row"><span class="label">SMA 200</span><span>${sma200}</span></div>
          <div class="row"><span class="label">52W High</span><span>${h52}</span></div>
          <div class="row"><span class="label">52W Low</span><span>${l52}</span></div>
          <div class="row"><span class="label">Allocation</span><span>${alloc}</span></div>
          ${e.earnings?.length ? `<div class="row"><span class="label">Next Earnings</span><span>${e.earnings[0].date} (${e.earnings[0].hour})</span></div>` : ''}
          <div style="margin-top:8px"><div class="section-label">Signals</div>${signals || '<span style="color:#555">None</span>'}</div>
          ${e.news?.length ? `<div style="margin-top:8px"><div class="section-label">Recent News</div>${e.news.map(n => `<div class="news-item">${n.headline}</div>`).join('')}</div>` : ''}
        </div>
      </div>
    </td></tr>`;
  });

  tbody.innerHTML = html;
}

function toggleDetail(ticker) {
  const row = document.getElementById('detail-' + ticker);
  const isOpen = row.classList.contains('open');
  // Close all
  document.querySelectorAll('.detail-row.open').forEach(r => r.classList.remove('open'));
  // Destroy old charts
  Object.values(openCharts).forEach(c => c.destroy());
  openCharts = {};

  if (!isOpen) {
    row.classList.add('open');
    const t = DATA.tickers[ticker]?.technicals;
    if (t?.chart?.length) {
      const ctx = document.getElementById('chart-' + ticker).getContext('2d');
      const labels = t.chart.map(p => new Date(p.t * 1000).toLocaleDateString());
      const prices = t.chart.map(p => p.c);
      const sma50Line = t.sma50 ? Array(prices.length).fill(t.sma50) : null;
      const sma200Line = t.sma200 ? Array(prices.length).fill(t.sma200) : null;
      const datasets = [{
        label: ticker, data: prices,
        borderColor: '#e94560', backgroundColor: '#e9456015',
        fill: true, tension: 0.3, pointRadius: 0, borderWidth: 2,
      }];
      if (sma50Line) datasets.push({ label: 'SMA50', data: sma50Line, borderColor: '#2979ff', borderWidth: 1, borderDash: [5,5], pointRadius: 0, fill: false });
      if (sma200Line) datasets.push({ label: 'SMA200', data: sma200Line, borderColor: '#ffd600', borderWidth: 1, borderDash: [5,5], pointRadius: 0, fill: false });

      openCharts[ticker] = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: {
            x: { display: true, ticks: { color: '#555', maxTicksLimit: 6, font: { size: 10 } }, grid: { color: '#1f1f3a' } },
            y: { display: true, ticks: { color: '#555', font: { size: 10 } }, grid: { color: '#1f1f3a' } },
          },
          plugins: { legend: { labels: { color: '#888', font: { size: 11 } } } },
        }
      });
    }
  }
}

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderTickers();
}

function sortTable(col) {
  if (sortCol === col) { sortAsc = !sortAsc; } else { sortCol = col; sortAsc = false; }
  renderTickers();
}

function renderBriefings() {
  const el = document.getElementById('briefing-history');
  if (!BRIEFINGS.length) { el.innerHTML = 'No briefings yet'; el.classList.remove('loading'); return; }
  el.innerHTML = BRIEFINGS.slice(0, 15).map((b, i) => {
    const typeLabel = b.type === 'pre-market' ? '🌅 Pre-Market' : '🌆 Pre-Close';
    return `<div class="briefing-card" onclick="this.classList.toggle('open')">
      <div class="meta"><span>${b.date} — ${typeLabel}</span><span>Click to expand</span></div>
      <div class="briefing-content">${b.content}</div>
    </div>`;
  }).join('');
  el.classList.remove('loading');
}

loadData();
</script>
</body>
</html>
