name: Market Analysis

on:
  schedule:
    - cron: "30 12 * * 1-5"  # 8:30 AM ET (UTC-4)
    - cron: "0 19 * * 1-5"   # 3:00 PM ET (UTC-4)
  workflow_dispatch:
    inputs:
      briefing_type:
        description: "Briefing type"
        required: false
        default: "pre-market"
        type: choice
        options:
          - pre-market
          - pre-close

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine briefing type
        id: briefing
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.briefing_type }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" -lt 15 ]; then
              echo "type=pre-market" >> $GITHUB_OUTPUT
            else
              echo "type=pre-close" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python analyzer.py ${{ steps.briefing.type }}
